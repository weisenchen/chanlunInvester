# UVIX 缠论监控 Cron 配置 (已更新)
# 包含：盘前预警 + 实时监控 + 盘后总结

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 监控任务配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

monitor:
  symbol: UVIX
  name: "2x Long VIX Futures ETF"
  enabled: true
  
  # 操作级别
  timeframe: 30m
  
  # 监控频率
  check_interval_minutes: 30
  
  # 监控时间 (美东时间)
  trading_hours:
    start: "09:30"
    end: "16:00"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Cron 任务列表
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

cron_jobs:
  # 1. 盘前预警 (9:00 EST - 开盘前 30 分钟)
  - name: "盘前预警"
    schedule: "0 13 * * 1-5"  # UTC 13:00 = ET 9:00
    script: "scripts/uvix_premarket_alert.py"
    description: "Pre-market alert 30 minutes before open"
    enabled: true
  
  # 2. 开盘监控 (9:30 EST)
  - name: "开盘监控"
    schedule: "30 13 * * 1-5"  # UTC 13:30 = ET 9:30
    script: "examples/uvix_monitor.py"
    description: "Market open check"
    enabled: true
  
  # 3. 盘中监控 (10:00-15:00 EST, 每 15 分钟)
  - name: "盘中监控"
    schedule: "*/15 14-19 * * 1-5"  # UTC 14:00-19:00 = ET 10:00-15:00
    script: "examples/uvix_monitor.py"
    description: "Active trading hours monitoring"
    enabled: true
  
  # 4. 常规监控 (9:30-16:00 EST, 每 30 分钟)
  - name: "常规监控"
    schedule: "*/30 13-20 * * 1-5"  # UTC 13:30-20:00 = ET 9:30-16:00
    script: "examples/uvix_monitor.py"
    description: "Regular trading hours monitoring"
    enabled: true
  
  # 5. 盘后总结 (16:30 EST)
  - name: "盘后总结"
    schedule: "30 20 * * 1-5"  # UTC 20:30 = ET 16:30
    script: "examples/uvix_monitor.py"
    description: "Post-market summary"
    enabled: true

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 提醒配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

alerts:
  enabled: true
  channels:
    - telegram
    - console
    - file
  
  triggers:
    on_bsp_detected: true
    on_divergence_detected: true
    on_premarket: true  # 盘前预警
    on_market_open: true  # 开盘提醒
    on_market_close: true  # 收盘总结
    on_confidence_above: 0.7

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 日志配置
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

logging:
  directory: ./logs/
  files:
    - uvix_cron.log
    - uvix_alerts.log
    - premarket_alerts.log
  max_size_mb: 50
  backup_count: 10
