version: '3.8'

# 缠论 Invester Enterprise - Docker Compose 部署配置
# 适用于中小型企业私有化部署

services:
  # ==================== 网关层 ====================
  
  # MCP Gateway - API 入口
  gateway:
    image: chanlun/gateway:latest
    container_name: chanlun-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8443}:8443"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=24h
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
    volumes:
      - ./ssl:/app/ssl:ro
      - ./logs/gateway:/app/logs
    depends_on:
      - redis
      - mcp-server
    networks:
      - chanlun-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
  
  # WebSocket Gateway - 实时推送
  ws-gateway:
    image: chanlun/ws-gateway:latest
    container_name: chanlun-ws-gateway
    restart: unless-stopped
    ports:
      - "${WS_PORT:-8765}:8765"
    environment:
      - REDIS_URL=redis://redis:6379
      - MAX_CONNECTIONS=10000
      - LOG_LEVEL=info
    depends_on:
      - redis
    networks:
      - chanlun-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
  
  # ==================== 应用层 ====================
  
  # MCP Server - 业务逻辑
  mcp-server:
    image: chanlun/mcp-server:latest
    container_name: chanlun-mcp-server
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/chanlun
      - CLICKHOUSE_URL=clickhouse://clickhouse:9000/chanlun
      - REDIS_URL=redis://redis:6379
      - RUST_ENGINE_URL=http://engine:8080
      - LOG_LEVEL=info
    volumes:
      - ./config:/app/config:ro
      - ./logs/mcp:/app/logs
    depends_on:
      - postgres
      - clickhouse
      - redis
      - engine
    networks:
      - chanlun-network
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G
  
  # AI Agent Service
  agent-service:
    image: chanlun/agent-service:latest
    container_name: chanlun-agent-service
    restart: unless-stopped
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-claude}
      - LLM_API_KEY=${LLM_API_KEY}
      - MCP_SERVER_URL=http://mcp-server:8000
      - LOG_LEVEL=info
    volumes:
      - ./logs/agents:/app/logs
    depends_on:
      - mcp-server
    networks:
      - chanlun-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
  
  # ==================== 核心引擎 ====================
  
  # Rust 缠论引擎
  engine:
    image: chanlun/engine:latest
    container_name: chanlun-engine
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - RUST_LOG=info
      - NUM_WORKERS=4
    volumes:
      - ./logs/engine:/app/logs
    networks:
      - chanlun-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
  
  # ==================== 数据层 ====================
  
  # PostgreSQL - 业务数据
  postgres:
    image: postgres:15-alpine
    container_name: chanlun-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=chanlun
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    networks:
      - chanlun-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ClickHouse - 时序数据
  clickhouse:
    image: clickhouse/clickhouse-server:23-alpine
    container_name: chanlun-clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_DB=chanlun
      - CLICKHOUSE_USER=${DB_USER}
      - CLICKHOUSE_PASSWORD=${DB_PASSWORD}
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.xml:ro
    networks:
      - chanlun-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # Redis - 缓存
  redis:
    image: redis:7-alpine
    container_name: chanlun-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - ./backups/redis:/backups
    networks:
      - chanlun-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # ==================== 监控层 ====================
  
  # Prometheus - 监控指标
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: chanlun-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - chanlun-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
  
  # Grafana - 可视化
  grafana:
    image: grafana/grafana:10.0.0
    container_name: chanlun-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - chanlun-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
  
  # ==================== 辅助服务 ====================
  
  # 定时任务调度器
  scheduler:
    image: chanlun/scheduler:latest
    container_name: chanlun-scheduler
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/chanlun
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./logs/scheduler:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - chanlun-network
  
  # 数据备份服务
  backup:
    image: chanlun/backup:latest
    container_name: chanlun-backup
    restart: unless-stopped
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - BACKUP_SCHEDULE=0 2 * * *  # 每天 2:00 AM
    volumes:
      - ./backups:/backups
      - pg_data:/var/lib/postgresql/data:ro
    depends_on:
      - postgres
    networks:
      - chanlun-network

# ==================== 网络配置 ====================

networks:
  chanlun-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==================== 存储卷 ====================

volumes:
  pg_data:
    driver: local
  ch_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ==================== 安全配置 ====================

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  llm_api_key:
    file: ./secrets/llm_api_key.txt
